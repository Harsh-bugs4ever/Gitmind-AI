services:
  - type: web
    name: gitmind-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -e . && curl -fsSL https://withcoral.com/install.sh | sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
